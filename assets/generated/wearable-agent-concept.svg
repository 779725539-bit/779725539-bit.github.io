<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Daemon Wearable Agent concept</title>
  <desc id="desc">Cyber industrial wearable AI agent pendant with magnetic dock, sensor ring, and always-on ambient light core.</desc>
  <defs>
    <radialGradient id="core" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff4b6"/>
      <stop offset=".35" stop-color="#00e5d4"/>
      <stop offset="1" stop-color="#163153"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
