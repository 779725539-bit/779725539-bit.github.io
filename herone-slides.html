  <style>
    :root{--bg:#f4ede3;--paper:rgba(255,250,243,.88);--ink:#1e2430;--muted:#6d7482;--line:rgba(30,36,48,.1);--accent:#dc6d43;--accent-soft:rgba(220,109,67,.14);--teal:#2f8b82;--shadow:0 24px 60px rgba(55,42,26,.14)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;overflow:hidden;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,rgba(220,109,67,.18),transparent 22%),radial-gradient(circle at bottom right,rgba(47,139,130,.18),transparent 24%),linear-gradient(145deg,#f4ede3 0%,#efe4d6 48%,#e9dccb 100%)}
    body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(42,32,26,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(42,32,26,.04) 1px,transparent 1px);background-size:72px 72px;opacity:.4;pointer-events:none}
    button{font:inherit}.deck{position:relative;width:100vw;height:100vh}.slides{display:flex;width:600vw;height:100vh;transition:transform .42s ease}.slide{width:100vw;height:100vh;padding:28px;display:flex;align-items:center;justify-content:center}
    .panel{position:relative;width:min(1280px,calc(100vw - 56px));height:min(760px,calc(100vh - 56px));border-radius:36px;border:1px solid rgba(30,36,48,.08);background:linear-gradient(180deg,rgba(255,251,245,.95),rgba(250,244,236,.88));box-shadow:var(--shadow);overflow:hidden;padding:34px}
    .topbar,.meta-line{position:relative;z-index:1;display:flex;justify-content:space-between;gap:16px;align-items:center}.topbar{margin-bottom:24px}
    .brand,.counter,.mode-badge,.back-link{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.56);backdrop-filter:blur(10px);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:rgba(30,36,48,.78)}
    .content{position:relative;z-index:1;display:grid;gap:22px;height:calc(100% - 72px)}.cover-grid,.two-col{display:grid;gap:20px;grid-template-columns:1.04fr .96fr;align-items:stretch;height:100%}
.eyebrow{color:var(--teal);font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700}h1,h2,h3{margin:0;font-family:"Songti SC","STSong","Source Han Serif SC","Noto Serif SC",serif;line-height:1.05;letter-spacing:-.03em}h1{font-size:clamp(42px,6vw,72px);max-width:8em}h2{font-size:clamp(34px,4vw,54px)}h3{font-size:26px}
    p{margin:0;color:var(--muted);line-height:1.72;font-size:16px}.lead{color:rgba(30,36,48,.86);font-size:18px;max-width:34em}
    .hero-copy,.hero-side,.frame,.tall,.role-list,.mini-grid,.bullet-list,.timeline,.measure-list{display:grid;gap:16px}.hero-side,.frame,.tall{padding:22px;border-radius:28px;border:1px solid var(--line);background:var(--paper);box-shadow:0 18px 40px rgba(58,45,31,.08)}
    .role-button{display:flex;justify-content:space-between;gap:12px;width:100%;padding:16px 18px;border-radius:22px;border:1px solid rgba(30,36,48,.08);background:rgba(255,255,255,.74);color:var(--ink);cursor:pointer}.role-button.active{border-color:rgba(220,109,67,.28);background:linear-gradient(180deg,rgba(220,109,67,.12),rgba(255,255,255,.82))}
    .role-button strong,.timeline strong,.metric strong{font-size:16px;color:var(--ink)}.role-button span{font-size:14px;color:var(--muted);line-height:1.6}
.mini-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.metric{padding:18px;border-radius:24px;border:1px solid var(--line);background:rgba(255,255,255,.65)}.metric .label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.metric .value{font-family:"Songti SC","STSong","Source Han Serif SC","Noto Serif SC",serif;font-size:28px;line-height:1.15}
    .bullet{position:relative;padding-left:16px;color:rgba(30,36,48,.82);line-height:1.65}.bullet::before{content:"";position:absolute;left:0;top:11px;width:7px;height:7px;border-radius:50%;background:var(--accent)}
    .timeline-step{display:grid;grid-template-columns:84px 1fr;gap:12px;align-items:start;padding:14px 0;border-top:1px solid rgba(30,36,48,.08)}.timeline-step:first-child{border-top:none;padding-top:0}.step-tag{display:inline-flex;width:fit-content;padding:6px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .page-nav{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:inline-flex;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,251,245,.8);border:1px solid rgba(30,36,48,.08);backdrop-filter:blur(12px);z-index:5}.dot{width:10px;height:10px;border-radius:50%;background:rgba(30,36,48,.18);cursor:pointer;border:none}.dot.active{transform:scale(1.2);background:var(--accent)}
    .arrow,.back-link{position:fixed;z-index:5;text-decoration:none;color:var(--ink)}.arrow{top:50%;transform:translateY(-50%);width:48px;height:48px;border:1px solid rgba(30,36,48,.08);border-radius:50%;background:rgba(255,251,245,.76);cursor:pointer}.left{left:18px}.right{right:18px}.back-link{left:18px;top:18px;padding:10px 14px;background:rgba(255,251,245,.72)}
    @media (max-width:980px){html,body{overflow:auto}.slides{width:100%;height:auto;display:grid}.slide{width:100%;height:auto;min-height:100vh}.panel{width:calc(100vw - 24px);height:auto;min-height:calc(100vh - 24px);padding:22px}.cover-grid,.two-col,.mini-grid{grid-template-columns:1fr}.page-nav,.arrow{display:none}}
  </style>
</head>

  <script>
    const content={leader:{label:"领导版本",heroLead:"先讲结果：HerOne 不是另一个记事 App，而是把语音入口、长期记忆和代办执行连成一条新产品线。",heroTitle:"一套能沉淀长期记忆、又能产出结果的 AI Native App",heroSummary:"它用最轻的硬件动作完成记录，用 App 完成理解、代管与执行，目标是抢占“个人记忆操作系统”入口。",problemTitle:"问题不是没人记笔记，而是没人持续用。",problemIntro:"今天的记录工具解决了存储，却没有解决回收、行动和情感连接，所以大量语音、灵感、待办最终都沉底。",problemBullets:["记录成本高，回看成本更高。","用户有表达冲动，但没有稳定整理习惯。","现有产品大多停在记下，没有继续帮用户做成结果。"],whyTitle:"为什么现在值得做",whyBullets:["语音理解、摘要、意图分类已经足够成熟，可以把碎片语音直接变结构化记忆。","市场上还没有真正占住“陪伴 + 执行”双价值的个人 AI 入口。","如果先从高频记录场景切入，就有机会长出后续会员、硬件和服务收入。"],solutionTitle:"产品定义：一层记忆，两种产出。",solutionIntro:"HerOne 的关键不是功能堆叠，而是把“被记住”和“被推进”放在同一个系统里。",hardwareText:"挂件只做一件事：让用户在最短动作里完成记录，降低打开 App 的门槛。",appText:"App 不做笔记仓库，而是把记录变成今天、记忆、陪伴、空间、我的五个可用场景。",loopTitle:"核心闭环",loopSteps:[["Step 1","说一句","按下即录，松开即传。"],["Step 2","系统理解","转写、分类、识别情绪和意图。"],["Step 3","进入长期记忆","沉淀为任务、灵感、情绪或关系线索。"],["Step 4","给出结果","返回提醒、总结、陪伴式回应或执行建议。"]],mvpTitle:"先做一个能证明方向的 MVP。",mvpIntro:"第一阶段目标不是做大全，而是证明高频输入能带来持续留存和回收价值。",mvpBullets:["语音输入 + 秒级转写。","四类分类：任务、灵感、情绪、留存。","今天页聚合结果，晚上给出摘要回顾。","基础陪伴回复和长期记忆查询。"],planTitle:"资源与推进",planSteps:[["Phase 1","验证需求","先用 App 版跑通输入、回收、留存。"],["Phase 2","验证粘性","观察用户是否愿意持续说、持续回看。"],["Phase 3","验证商业化","根据高频人群切会员、硬件和高级服务。"]],focusTitle:"领导最该盯的三件事",focusIntro:"这件事不是单纯做功能，而是在判断它能不能形成新的个人 AI 入口。",focusBullets:["是否能占住高频语音入口。","是否能形成长期记忆壁垒。","是否能证明留存与付费意愿。"],measureTitle:"判断标准",measures:[["核心指标","7 日留存、周语音条数、回看率"],["商业指标","会员转化、硬件意愿、ARPU"],["风险指标","误分类率、隐私敏感反馈、硬件使用率"]],finalTitle:"HerOne 值得做，因为它可能不是工具，而是入口。",finalIntro:"如果它能同时承接记录、陪伴和执行，就不是一个细分记事 App，而是个人生活流的基础设施。",finalBullets:["短期看，是高频记录场景的提效产品。","中期看，是带长期记忆的个人 AI 助理。","长期看，是可连接硬件、服务和关系网络的用户入口。"],nextTitle:"下一步建议",nextBullets:["先确认 MVP 边界和目标用户。","先跑轻 App，不急着重硬件量产。","用留存和复访验证价值，再决定加码资源。"]},
      colleague:{label:"同事版本",heroLead:"先讲怎么落地：HerOne 的核心是语音输入链路、记忆结构和输出场景，而不是一个大而全的 App。",heroTitle:"把语音瞬时记录，转成可回收、可执行、可陪伴的系统",heroSummary:"产品上是一套信息流分发逻辑，技术上是一条“语音到结构化记忆再到场景输出”的流水线。",problemTitle:"现有方案的问题是闭环不完整。",problemIntro:"用户会记录，但没有后续；系统能存储，但不会理解；工具能展示，但不替用户管理，所以价值断在中间。",problemBullets:["输入散：语音、待办、灵感、情绪混在一起。","输出弱：记录之后缺少整理、归档和回流动作。","协作难：硬件、App、AI 服务如果边界不清，后面会反复返工。"],whyTitle:"为什么这套结构可做",whyBullets:["输入动作极轻，适合做高频习惯养成。","分类和记忆层一旦建好，后续可以不断扩展输出场景。","先做 App 验证，再决定硬件深度，能降低试错成本。"],solutionTitle:"产品结构：输入层、记忆层、输出层。",solutionIntro:"硬件和 App 不是两个产品，而是一个链路上的前台入口和后端场景面板。",hardwareText:"挂件端负责低摩擦采集，只保留按下录音、松开发送、联网上传这类最少动作。",appText:"App 端承接今天、记忆、陪伴、空间、我五个一级信息面，做查询、回收、呈现和设置。",loopTitle:"主链路",loopSteps:[["Input","采集","语音流进入转写服务。"],["Parse","理解","做分类、标签、时间和情绪识别。"],["Store","记忆","落入长期记忆与今日队列。"],["Output","返回","触发摘要、提醒、陪伴回复或任务管理。"]],mvpTitle:"MVP 边界要收紧。",mvpIntro:"第一期只验证“说得进来、找得回来、会有回声”，不要一开始铺太多复杂关系网络。",mvpBullets:["只做语音入口，不扩多模态。","只保留四类分类，避免标签体系过重。","只做今天页、记忆检索、夜间摘要、基础陪伴。","先跑纯 App，再接轻硬件联动。"],planTitle:"协作点",planSteps:[["产品","定义信息架构","一级导航、分类规则、回流机制。"],["研发","搭核心链路","转写、分类、存储、查询、摘要。"],["运营","做冷启动","种子用户筛选、反馈收集、留存观察。"]],focusTitle:"同事最该对齐的事",focusIntro:"项目成败不在页面多少，而在信息结构和闭环是否稳定。",focusBullets:["数据模型先统一：一条记录到底有哪些字段。","输出策略先收敛：哪些场景即时回，哪些延迟回。","边界条件先定义：误识别、无网、重复记录、隐私处理。"],measureTitle:"研发与产品观察点",measures:[["体验指标","输入成功率、首条反馈时延、检索命中率"],["产品指标","日活说话人数、每人周记录条数、夜报打开率"],["稳定性","上传失败率、分类置信度、异常回退率"]],finalTitle:"HerOne 的重点不是做重，而是先把主链路跑通。",finalIntro:"只要输入、理解、记忆、回流这四段打通，后面的空间、分享、硬件能力都能顺着长出来。",finalBullets:["先守住核心信息结构。","先把高频小闭环打稳。","后续再扩陪伴、社交和设备形态。"],nextTitle:"下一步建议",nextBullets:["先出信息架构和状态流。","先拆 MVP 接口与埋点。","先找 20 个高频语音用户做真实观察。"]},
      user:{label:"用户版本",heroLead:"先讲你会得到什么：HerOne 不是让你更努力整理，而是让你说一句，就有人替你记住、整理、再提醒你。",heroTitle:"一个会记住你、也会帮你把事情往前推的 App",heroSummary:"你不用专门打开记事本，不用逼自己整理。想到什么，说出来，它会把重要内容留下，并在合适的时候还给你。",problemTitle:"你可能也有这些麻烦。",problemIntro:"很多重要的念头、待办和情绪，其实不是没出现过，而是出现时没来得及记，记了以后又找不到。",problemBullets:["灵感一闪而过，后来完全想不起来。","待办记过很多次，但还是漏掉。","情绪和生活片段留下了，却没有被真正理解。"],whyTitle:"HerOne 想解决什么",whyBullets:["让记录这件事变轻，不用停下手头动作。","让你说过的话，之后还能被重新用起来。","让一个工具不只是存东西，而是真的懂你的节奏。"],solutionTitle:"它怎么工作",solutionIntro:"你只需要说。剩下的整理、归类和提醒，大部分都由系统接手。",hardwareText:"如果配挂件，你按一下就能录，不必解锁手机，不必切 App。",appText:"App 会把你的内容分成今天要处理的、值得记住的、需要被安慰的和以后能回看的。",loopTitle:"你会经历的流程",loopSteps:[["1","说出来","想到什么，直接说一句。"],["2","系统记住","它先帮你转成文字，再理解这句话是什么。"],["3","在对的时候出现","该提醒的提醒，该安慰的安慰，该沉淀的沉淀。"],["4","越用越懂你","它会慢慢积累你的习惯、关系和偏好。"]],mvpTitle:"第一版能给你什么",mvpIntro:"不会很复杂，但会先把最常用的价值给你。",mvpBullets:["语音说完马上有文字结果。","自动分出任务、灵感、心情和留存内容。","今天页帮你看今天最重要的内容。","晚上给你一份属于自己的回顾。"],planTitle:"后面会怎么变好",planSteps:[["先","帮你记住","先解决不想打字、不想整理。"],["再","帮你回看","让你真的找得到、用得上。"],["然后","帮你推进","从记住你，到替你把事往前推。"]],focusTitle:"你最关心的三个点",focusIntro:"如果这三点成立，这个产品才值得你继续用。",focusBullets:["是不是足够简单，想到就能说。","是不是足够可信，隐私不会乱跑。","是不是足够有用，之后真的能帮到你。"],measureTitle:"用户价值标准",measures:[["省心感","更少遗漏，更少来回翻找"],["获得感","每天都有被接住、被提醒、被整理的感觉"],["信任感","内容安全、可控、不会乱发出去"]],finalTitle:"HerOne 想做的，不是一个更复杂的工具。",finalIntro:"它想成为你生活里一个轻一点、懂你一点、能帮你一点的长期伙伴。",finalBullets:["你不用更自律，也能留下重要内容。","你不用主动整理，它会先帮你做第一步。","你说过的话，会慢慢变成更懂你的记忆系统。"],nextTitle:"接下来最值得期待",nextBullets:["先把记录变得毫不费力。","再把记忆变得真的可用。","最后把陪伴和行动结合在一起。"]}};

    function updateMode(mode){state.mode=mode;const c=content[mode];Object.entries(textMap).forEach(([id,key])=>document.getElementById(id).textContent=c[key]);bullets(els.problemBullets,c.problemBullets);bullets(els.whyBullets,c.whyBullets);steps(els.loopSteps,c.loopSteps);bullets(els.mvpBullets,c.mvpBullets);steps(els.planSteps,c.planSteps);bullets(els.focusBullets,c.focusBullets);measures(els.measureCards,c.measures);bullets(els.finalBullets,c.finalBullets);bullets(els.nextBullets,c.nextBullets);roleButtons.forEach(btn=>btn.classList.toggle("active",btn.dataset.mode===mode));badgeIds.forEach(id=>document.getElementById(id).textContent=c.label)}
    function updatePage(page){state.page=Math.max(0,Math.min(page,state.pageCount-1));slidesEl.style.transform=`translateX(-${state.page*100}vw)`;[...navEl.children].forEach((dot,i)=>dot.classList.toggle("active",i===state.page))}
